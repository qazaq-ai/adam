name: Rust

# v4.7.10 — auto-trigger disabled. GitHub Actions billing was
# blocking runs on every push to main, causing failed-job noise.
# All gates this workflow enforces (cargo fmt, cargo test,
# validate_foundation) are also run locally before every commit
# per `feedback_cargo_fmt_pre_commit` / `feedback_release_docs`,
# so disabling auto-trigger does not lose real safety. Keeping the
# YAML so it can be re-enabled with a one-line revert when billing
# is fully restored. Manual runs available via Actions tab →
# "Rust" workflow → Run workflow.
on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cargo fmt
        run: cargo fmt --all --check

      - name: Cargo test
        run: cargo test --workspace --locked

      - name: Validate foundation manifests
        run: ./scripts/validate_foundation.sh
