name: Rust

# **v5.16.5 — public-repo CI re-armed.** Auto-trigger was disabled in
# v4.7.10 to silence Actions-billing noise; restored now that the
# repository is public and external contributors / casual visitors
# expect a green badge on the README. Fast path: cache + clippy +
# default-features test; the voice-feature gate (cpal/hound/whisper
# shell-out) is checked separately so a missing audio dev-package on
# the runner can never block the kernel pipeline.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      # **v5.16.7** — `cargo clippy --all-targets` and `cargo test
      # --workspace` reach the `adam-voice` crate, whose `cpal`
      # dependency requires ALSA on Linux. v5.16.5 wired voice
      # behind a separate `voice-feature-check` job that installed
      # libasound2-dev, but it's also needed in the default-features
      # verify job (clippy/test pull in adam-voice as a workspace
      # member regardless of features). Without it, alsa-sys's build
      # script panics with «Package alsa was not found». The earlier
      # v5.16.5 / v5.16.6 verify failures masked this with clippy
      # lint errors firing before clippy reached adam-voice.
      - name: install ALSA dev headers for cpal (adam-voice workspace member)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: cargo fmt --all --check
        run: cargo fmt --all --check

      - name: cargo clippy --all-targets -- -D warnings
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test --workspace --locked
        run: cargo test --workspace --locked

      - name: validate_foundation.sh
        run: bash ./scripts/validate_foundation.sh
        if: ${{ hashFiles('scripts/validate_foundation.sh') != '' }}

      - name: check_metrics_currency.sh
        run: bash ./scripts/check_metrics_currency.sh
        if: ${{ hashFiles('scripts/check_metrics_currency.sh') != '' }}

  voice-feature-check:
    name: --features voice (build only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: install ALSA dev headers for cpal
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: cargo check --features voice -p adam-dialog
        run: cargo check -p adam-dialog --features voice --bin adam_chat

      - name: cargo test -p adam-voice
        run: cargo test -p adam-voice --locked
