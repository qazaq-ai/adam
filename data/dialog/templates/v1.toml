# v4.4.0 — User opted out of resolving a pending contradiction
# (replied "neither / I don't know / skip" to a CheckContradiction
# prompt). `Conversation::try_dismiss_pending_contradiction` has
# just set BOTH contested values to Superseded and dropped the
# matching BeliefConflict. This template family acknowledges the
# dismissal so the user knows belief was actually mutated. Track C
# of `docs/intelligence_roadmap.md` (belief-poisoning recovery).
[[families]]
key = "dismiss_contradiction"
templates = [
    "ұқтым, екеуін де жадтан өшірдім",
    "түсіндім, екеуін де есепке алмаймын — қалаған кезде қайта айтып өтесіз",
    "екеуінен де бас тарттым; кейін нақты болсын дегенде айтыңыз",
    "жарайды, екі нұсқаны да ұмытайын",
]

# v4.4.5 — `Action::CheckContradiction`. The planner's step 1
# already routes here when the belief carries an unresolved
# conflict; pre-v4.4.5 the renderer ignored the action and emitted
# a confirmation from `intent_key(StatementOfLocation)` like
# «Алматыда екеніңізді есте сақтаймын», which committed to one of
# the two contested values. The new `__check_contradiction__`
# marker (set in `Conversation::turn_with_trace` whenever
# `ActionPlan.action == CheckContradiction`) routes here instead
# and asks the clarifying question the action layer intended all
# along. Slots `{old_value}` / `{new_value}` are populated from
# `BeliefConflict.candidate_values` for the active conflict.
[[families]]
key = "check_contradiction"
templates = [
    "{old_value} ма, әлде {new_value} ма — қайсысы дұрыс?",
    "екі нұсқа жазылып тұр: {old_value} мен {new_value}; қайсысын ұстанамыз?",
    "сәл шатастым — сіз {old_value}-да ма, әлде {new_value}-да ма?",
    "қайсысы нақты — {old_value} ма, {new_value} ма? нақтылап жіберсеңіз",
]

# ---------- Social topics (v0.8.0 new) ----------

# User introduced self by name. `{name_respect}` is substituted by the realiser
# with the extracted PersonName entity. `{name|instrumental}` uses the
# FST to produce the grammatically correct "with X" form: Дәулет →
# Дәулетпен, Ерлан → Ерланмен.
[[families]]
key = "statement_of_name"
templates = [
    # **v4.50.5** — Kazakh respectful address by default. The first
    # three variants gate on `{name_respect_distinct}`, fillable
    # ONLY when the respect form differs from the literal name
    # (consonant-initial names like Дәулет → Дәке, Мұрат → Мәке).
    # When fillable, all three are admissible and the planner picks
    # one — adam consistently uses Дәке-form, matching the cultural
    # norm of addressing peers/elders with the respectful diminutive
    # rather than the bare name. When the diminutive collapses to
    # the literal (vowel-initial names like Абай, Алия), these
    # gate-fail and the planner falls through to the
    # instrumental-form fallback below.
    "Танысқаныма қуаныштымын, {name}! Сізді {name_respect_distinct} деп атаймын — қазақ дәстүрі бойынша",
    "{name_respect_distinct}, танысқаныма қуаныштымын",
    "{name} деген атыңызды есте сақтап, сізді {name_respect_distinct} деп атаймын — қазақша",
    # **v4.51.5** — instrumental fallback retained ONLY as the
    # vowel-no-consonant safety case (e.g. single-vowel names that
    # have no extractable diminutive). All real Kazakh names —
    # consonant-initial AND vowel-initial — now produce a
    # `name_respect_distinct` value (see
    # `language_core::kazakh_respectful_address` v4.51.5 vowel-rule
    # extension), so the three respect-form variants above cover
    # the full pool. The instrumental fallback below is a safety
    # net for unusual inputs (single-letter / non-Cyrillic names).
    "{name|instrumental} танысқаныма қуаныштымын",
    "Сізді {name_respect_distinct} деп атаймын, қош келдіңіз",
]

