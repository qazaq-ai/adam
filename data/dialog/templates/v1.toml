templates = [
    "кешіріңіз, мен Қазақ тілінде сұраған математикалық есептеулерді әзірге өңдемеймін; қарапайым сандық өрнекті (мысалы «5+5», «7*3») жазсаңыз, есептеп беремін",
    "санақ-есептеу әлі қазақша сөйлемдер арқылы менің мүмкіндігімде жоқ; «X+Y» немесе «X*Y» түрінде сандармен жазып берсеңіз, шығарып беремін",
    "Қазақ тілінде өрнектелген математикалық есепті әлі шеше алмаймын — қарапайым сандық өрнекті жазсаңыз («5+5», «12/4»), есептейтін боламын",
]

# v4.6.15 — Math answer template family. When
# `discourse::try_evaluate_arithmetic` parses the input as pure
# integer arithmetic and computes a value, the planner injects
# `{math_value}` and routes here. Deterministic computation —
# no novel-text generation, no fabrication risk.
[[families]]
key = "math_answer"
# **v4.40.5** — removed the bare `{math_value}` template so every
# math answer has a verbal prefix. **v4.41.0** — added a Kazakh
# word-form rendering of the result via `{math_words}`. The
# rendering is computed by `discourse::render_kazakh_number_words`
# and surfaced by the planner alongside `{math_value}`. Templates
# that include `{math_words}` produce e.g. «Нәтижесі: 150 (жүз
# елу)» when the renderer succeeded, matching the user's
# expectation when the question was asked in word form. For
# results > 999_999_999 the renderer returns None and the
# planner inserts an empty string; templates fall through to a
# plain digit form via the alternates that don't use the slot.
templates = [
    "нәтижесі: {math_value}{math_words}",
    "жауабы — {math_value}{math_words}",
    "есептедім: {math_value}{math_words}",
]

# **v4.75.5** — Check-answer template families. User submits their
