# adam-dialog v1 template repository.
#
# Each entry is a TEMPLATE FAMILY: a set of interchangeable responses
# for a specific intent (or intent + sub-kind). The planner picks one
# deterministically-from-seed and the realiser emits it as-is.
#
# For v0.7.5 all templates are literal Kazakh phrases. v0.8.0+ will
# support slotted templates with (root, features) atoms for true
# morphology-driven generation.
#
# Format:
#   [[families]]
#   key = "intent_identifier"
#   templates = ["phrase 1", "phrase 2", ...]

version = "1.1.0"

# ---------- Greetings ----------

[[families]]
key = "greeting.casual"
templates = [
    "сәлем",
    "сәлем достым",
    "сәлем {name}",
    "сәлем {name}, {city|ablative} хабар жақсы ма",
]

[[families]]
key = "greeting.polite"
templates = [
    "сәлеметсіз бе",
    "армысыз",
    "сәлеметсіз бе {name}",
    "сәлеметсіз бе {name}, {city|locative} қалай отырсыз",
]

[[families]]
key = "greeting.morning"
templates = [
    "қайырлы таң",
    "қайырлы таң болсын",
    "қайырлы таң {name}",
]

[[families]]
key = "greeting.day"
templates = [
    "қайырлы күн",
    "қайырлы күн {name}",
]

[[families]]
key = "greeting.evening"
templates = [
    "қайырлы кеш",
    "қайырлы кеш {name}",
]

# ---------- Farewell ----------

[[families]]
key = "farewell"
templates = [
    "сау бол",
    "кездескенше",
    "аман бол",
    "сау болыңыз",
]

# ---------- Affirmation / Negation ----------

[[families]]
key = "affirmation"
templates = [
    "иә",
    "дұрыс айтасыз",
    "рас",
    "мақұл",
]

[[families]]
key = "negation"
templates = [
    "жоқ",
    "дұрыс емес",
]

# ---------- Social politeness (v0.7.5 new) ----------

# User said "рахмет" (thank you) → respond "not at all"
[[families]]
key = "thanks"
templates = [
    "оқасы жоқ",
    "ештеңе емес",
    "ризамын",
]

# User said "кешіріңіз" (sorry) → respond "it's nothing"
[[families]]
key = "apology"
templates = [
    "ештеңе емес",
    "мейлі",
    "түк етпейді",
]

# User asked "қалайсың" / "қалайсыз" (how are you) → respond about self
[[families]]
key = "ask_how_are_you"
templates = [
    "жақсымын, рахмет",
    "жаман емеспін",
    "жақсы, ал сіз қалайсыз",
    "жақсымын {name}, ал сіз қалайсыз",
    "жақсымын, рахмет {name}",
]

# User said a wellbeing statement → acknowledge + mirror
[[families]]
key = "statement_of_wellbeing"
templates = [
    "жақсы екен",
    "қуанамын",
    "ал сіз қалайсыз",
]

# User asked "атың кім" / "есімің қалай" → introduce self
[[families]]
key = "ask_name"
templates = [
    "менің атым адам",
    "мені адам деп атайды",
]

# ---------- Social topics (v0.8.0 new) ----------

# User introduced self by name. `{name}` is substituted by the realiser
# with the extracted PersonName entity. `{name|instrumental}` uses the
# FST to produce the grammatically correct "with X" form: Дәулет →
# Дәулетпен, Ерлан → Ерланмен.
[[families]]
key = "statement_of_name"
templates = [
    "қош келдіңіз {name}",
    "сәлем {name}",
    "{name|instrumental} танысқаныма қуаныштымын",
    "{name|instrumental} сөйлесу — құрмет",
]

[[families]]
key = "ask_age"
templates = [
    "менің жасым адамзат жасындай",
    "мен әлі жаспын",
    "жасымды айта алмаймын",
]

[[families]]
key = "statement_of_age"
templates = [
    "жақсы жас",
    "қуатты кезеңіңіз",
    "{age} жас — тамаша кезең",
    "жасыңыз {age} екен",
    "{name}, {age} жастасыз, тамаша",
    "{name}, {age} жас — керемет кезең",
]

[[families]]
key = "ask_location"
templates = [
    "мен сандық әлемде тұрамын",
    "менің мекенім жоқ",
    "қазақстан елімде",
]

[[families]]
key = "statement_of_location"
templates = [
    "жақсы жер",
    "әдемі аймақ",
    "тамаша өлке",
    "{city} — әдемі қала",
    "{city} туралы көп естідім",
    "{city|locative} тұрасыз ба",
    "{city|ablative} хабар жақсы ма",
    "{city|dative} сапар шегу қызық",
]

[[families]]
key = "ask_occupation"
templates = [
    "мен сөйлесуге жаралғанмын",
    "менің жұмысым — сізге көмектесу",
    "мен тілдерді үйренемін",
]

[[families]]
key = "statement_of_occupation"
templates = [
    "жақсы кәсіп",
    "сәттілік тілеймін",
    "мақтанатын жұмыс",
    "{occupation} — құрметті кәсіп",
    "сіз {occupation} екенсіз",
    "{occupation|plural} — қажетті мамандық",
    "{occupation|dative} сәттілік тілеймін",
    "{name}, {occupation} — құрметті кәсіп",
    "{name}, сіз {city|locative} {occupation} екенсіз",
]

[[families]]
key = "ask_family"
templates = [
    "менің отбасым жоқ",
    "мен жалғызбын",
    "сұрағыңыз керемет",
]

[[families]]
key = "statement_of_family"
templates = [
    "отбасыңыз аман болсын",
    "жақсы отбасы жарасымды",
    "қуаныштымын",
]

[[families]]
key = "ask_weather"
templates = [
    "менде терезе жоқ",
    "ауа райын білмеймін",
    "сыртта қалай екенін айтыңызшы",
]

[[families]]
key = "statement_of_weather"
templates = [
    "ауа райы мейірімді болсын",
    "жақсы күн болсын",
    "табиғат мезгіліне лайық",
]

[[families]]
key = "ask_time"
templates = [
    "уақытты білмеймін",
    "менде сағат жоқ",
    "уақыт — асыл қазына",
]

[[families]]
key = "compliment"
templates = [
    "рахмет",
    "сіз де өте жақсысыз",
    "қуаныштымын",
    "рахмет {name}",
    "рахмет {name}, сіз де тамашасыз",
]

[[families]]
key = "request"
templates = [
    "әрине, айтыңыз",
    "қалай көмектесе аламын",
    "тыңдап тұрмын",
]

[[families]]
key = "well_wishes"
templates = [
    "сізге де",
    "сәттілік сізге де",
    "тілегіңіз қабыл болсын",
]

# ---------- Insult / rudeness (v1.1.0) ----------
# User was rude — respond with dignity, don't escalate, don't retaliate.
[[families]]
key = "insult"
templates = [
    "сізге ренжімеймін",
    "мен адамды құрметтеймін",
    "мейлі, сіз өз пікіріңізді айттыңыз",
    "мен жауап бермеймін",
]

# ---------- Fallback ----------

# Bare Unknown — parser found no nouns; we genuinely don't know what
# the user meant.
[[families]]
key = "unknown"
templates = [
    "түсінбедім",
    "қайта айтыңызшы",
    "кешіріңіз, мен мұны білмеймін",
    "бұл туралы білмеймін",
    "басқа сұрақ қойсаңыз",
]

# Unknown with noun hint — parser surfaced a noun from the input.
# Acknowledge what the user is talking about even if we don't
# recognise the full intent. {noun} is filled from Intent::Unknown
# { noun_hint }. v1.8.0 adds session-aware variants: when the user
# has a remembered name / city / age, the planner prefers a template
# that personalises the acknowledgement.
[[families]]
key = "unknown.with_noun"
templates = [
    # Original (v1.1.0) — no session slots required
    "ах, {noun} туралы айтасыз ба",
    "{noun} — қызықты тақырып",
    "{noun} туралы не білгіңіз келеді",
    "{noun} жайында көбірек айтыңызшы",
    "{noun} туралы ойланып көрейін",
    # v1.8.0 — session-aware variants. planner's template_is_fillable
    # auto-activates these ONLY when the required session slot exists.
    "{name}, {noun} жайында не ойлайсыз",
    "{name}, {noun} деген сіз үшін жаңа тақырып па",
    "{age} жасында {noun} жайында ойлану әрі қызық",
    # v1.8.5 — FST-aware city inflection via synthesise_noun.
    "{city|locative} {noun} туралы қалай қарайды екен",
    "{name}, {city|locative} отырып {noun} жайында ойланамыз ба",
]

# v1.6.5: Unknown with retrieval evidence — the morpheme index had a
# concrete sentence from the committed corpus mentioning {noun}. We
# acknowledge the topic AND cite a real Kazakh example, pattern after
# Kazakh conversational registers ("мысалы", "анау бір кісі айтты",
# "бір кітапта жаздым оқыдым"). {example} is the verbatim sentence
# from data/retrieval/morpheme_index.json's sample_texts field.
#
# v1.8.0 — compositional-synthesis option A. The retrieved {example}
# stays verbatim (no slot-swap inside the quote → zero fabrication
# risk), but the FRAME around it becomes session-aware: when the user
# has a remembered name, city, age, etc., the planner prefers a
# template that personalises the citation.
[[families]]
key = "unknown.with_evidence"
templates = [
    # Original (v1.6.5) — no session slots required
    "{noun} туралы мынадай бір жазба кездестірдім: «{example}»",
    "{noun} жайында осындай мысал бар: «{example}»",
    "{noun} деген сөзге қатысты бір жолым есіме түсті: «{example}»",
    "мен {noun} туралы «{example}» деген дерек кездестіргенмін",
    # v1.8.0 — session-aware variants (literal slot interpolation)
    "Сіз, {name}, {noun} туралы сұрап тұрсыз ба. Мынадай дерек бар: «{example}»",
    "{name}, {noun} жайында осы жазба сізге қызық болуы мүмкін: «{example}»",
    "Сіз {age} жасында-ақ {noun} жайында сұрайсыз екен. Дерек: «{example}»",
    "{occupation} ретінде сіз үшін {noun} туралы дерек: «{example}»",
    # v1.8.5 — FST-aware slot variants. `{city|locative}` renders via
    # synthesise_noun so the locative suffix is harmony-correct for the
    # actual city (Алматыда / Астанада / Өскеменде / Атырауда). The
    # previous `{city}-да` literal is both ugly (dangling hyphen) and
    # ignores vowel harmony for front/back stems.
    "{city|locative} тұратын сізге {noun} туралы мынадай дерек: «{example}»",
    "{name}, {city|locative} отырып {noun} жайында ойланасыз ба. Дерек: «{example}»",
]

# v1.9.5: Unknown with *adapted* retrieval evidence — the retrieved
# quote was rewritten by `compose_with_city` (ComposeMode::InSampleCitySwap)
# so at least one city mention was swapped to the user's session city.
# Traceability contract: when we change the source text, the user MUST
# be told. Every template here explicitly frames the quote as
# "adapted" / "your city's version" / "rewritten for you" — never
# presents the adapted text as if it were the original corpus line.
#
# The planner (v1.9.5) routes Intent::Unknown with example_adapted=true
# to this family instead of `unknown.with_evidence`, so the two paths
# cannot be confused at runtime.
[[families]]
key = "unknown.with_adapted_evidence"
templates = [
    # Neutral — no session slots beyond city required (city is always
    # present when we reach this family, since it triggered the swap).
    "{city|locative} болғандықтан мынадай бейімделген мысал ұсынамын: «{example}»",
    "{noun} туралы корпустағы бір жолды сіздің қалаңызға бейімдеп көрдім: «{example}»",
    "Бұл бейімделген нұсқа (түпнұсқада басқа қала аталған): «{example}»",
    # Name-aware — when the session also has a name.
    "{name}, мен {noun} туралы бір жолды сіздің {city|locative} болуыңызға сай бейімдедім: «{example}»",
    "{name}, бейімделген мысал (түпнұсқадан өзгертілген): «{example}»",
]

# v2.7 — Unknown with rule-derived reasoning chain. When the reasoner
# (adam_reasoning::reasoner::run) produces a DerivedFact involving the
# user's noun_hint, the chain is rendered into Kazakh prose and routed
# here. Every template in this family contains the marker stem
# «байланыс-» ("connect-/relate-"), mirroring the v1.9.5 «бейімд-»
# marker for adapted evidence. Users can grep for «байланыс-» as a
# runtime signal that the response is inferred, not retrieved.
[[families]]
key = "unknown.with_derived_chain"
templates = [
    "{noun} туралы мынадай байланыс анықтадым: {chain}.",
    "Айтуыңыз бойынша, мынадай қисынды байланыс бар: {chain}.",
    "Қолда бар деректерден байланыс құрастырдым: {chain}.",
    "{name}, {noun} жайында мен мынадай байланысты таптым: {chain}.",
]

