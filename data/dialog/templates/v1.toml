    "Сіздің пікіріңізді сыйлаймын — иә, бұл қажет нәрсе.",
    "Иә, {noun} мәселесінде сіздің ойыңыз дұрыс.",
    # v4.35.5 no-noun variants
    "Иә, шынымен қажет нәрсе екен.",
    "Сіздің ойыңыз орынды — бұл маңызды.",
    "Иә, бұл шынымен керек деп ойлаймын.",
]

# Possibility («мүмкін») — user asks/claims X-V is possible.
# v4.35.5 — added no-{noun} variants.
[[families]]
key = "unknown.with_modal_possibility"
templates = [
    "Мүмкін екен, иә.",
    "{noun} жайында бұл мүмкіндік туралы нақты дерегім жоқ.",
    "Сіздің ойыңыз мүмкін болуы — қызық мәселе.",
    "Иә, мұндай мүмкіндік бар деп ойлауыңыз орынды.",
    "{noun} туралы пікіріңізді бағалаймын — мүмкін екеніне дау жоқ.",
    # v4.35.5 no-noun variants
    "Иә, мұндай мүмкіндік болуы ықтимал.",
    "Сіздің ойыңыз орынды — бұл мүмкін.",
]

# v4.36.0 — third SemFrame-driven response family. When the input
# carried past-evidential tense («-{Y}п(ты)» / болыпты / деген екен),
# `SemFrame::from_analysis` auto-derives `evidence: Some(Hearsay)`
# from `Tense::PastEvidential`; `Conversation::turn` copies onto
# `Intent::Unknown.input_evidence`; planner routes here.
#
# The user is REPORTING hearsay, not asserting first-hand knowledge.
# Surfacing a flat grounded fact would either ignore the evidential
# framing or appear to confirm a story adam can't verify. Templates
# echo the user's hedging back («сізге айтылған ба, нақты білмеймін»)
# and offer a curated fact only if available, marked as adam's own
# (not a confirmation of the user's hearsay).
[[families]]
key = "unknown.with_hearsay_hedge"
templates = [
    "Сізге айтылған сияқты екен — нақты дерегім жоқ.",
    "Сондай дерек естідіңіз бе, иә? Менде нақты ақпарат жоқ.",
    "{noun} жайлы сізге айтылған пікір болуы мүмкін, дегенмен мен растай алмаймын.",
    "Иә, сондай әңгіме бар екен — нақты дерегім жоқ.",
    "Сіз естіген сөз болса керек, бірақ мен тексере алмаймын.",
    # No-noun variants
    "Иә, сондай дерек естіген екенсіз — мен нақты білмеймін.",
    "Сізге айтылған әңгіме болуы мүмкін.",
]

# Ability («-а ал-») — user claims (or asks about) capability to do something.
# v4.35.5 — added no-{noun} variants for verb-only ability claims like
# «Жаза аламын» (battery case 21 — pre-v4.35.5 fell to "Түсінбедім").
[[families]]
key = "unknown.with_modal_ability"
templates = [
    "Жақсы екен, сіздің мүмкіндігіңізді түсіндім.",
    "{noun} жайында ондай қабілет болуы — пайдалы.",
    "Иә, сіз ондай нәрсе істей аласыз ба — бұл өзіңізге тән.",
    "Сіздің мүмкіндігіңізді сыйлаймын.",
    "Ондай нәрсе істей алу — жақсы қасиет.",
    # v4.35.5 no-noun variants — for verb-only ability claims
    # «Жаза аламын» / «Сөйлей алам» / «Оқи аламын».
    "Жақсы екен, ондай қабілетіңіз бар.",
    "Иә, сізде ондай мүмкіндік бар екен.",
    "Жарайсыз — ондай нәрсе істей алу — жақсы қасиет.",
]

# v4.37.5 — human-like clarification families. When topic extraction
# returned a candidate but the lexicon-aware band is `Low` (the only
# extraction available was a fallback: an adjective / pronoun / numeral
# tagged as `Analysis::Noun`, or `accusative_form_hint` stripping a
# suffix without lexicon validation), confidently citing a tangential
# fact about that candidate misreads the user's question. Instead,
# offer the candidate interpretation and INVITE the user to correct
# it. Same idea when noun_hint is None entirely — invite clarification
# instead of bare «Түсінбедім».
#
# Templates intentionally avoid asserting any new fact; their work is
# purely meta-conversational: surface the inferred subject (or absence
# thereof) and hand the next turn back to the user.
[[families]]
key = "unknown.clarify_low_confidence"
templates = [
    "Менің түсінуімше, сіз {noun} туралы сұрап тұрсыз ғой? Егер басқа нәрсе мегзеп тұрсаңыз, нақтырақ айтып жіберіңізші.",
    "Сұрағыңыз {noun} жайында ма? Дәл солай болса айтыңыз, басқаша болса нақтылап жіберсеңіз.",
    "Мен {noun} деген сөзге назар аудардым — сіздің сұрағыңыз дәл осы туралы ма? Егер басқаша болса, тағы бір рет тұжырымдап жіберіңіз.",
    "Сіз {noun} жайында сұрап отырсыз деп ұқтым. Дұрыс түсіндім бе? Толығырақ айтсаңыз болады.",
    "Мүмкін сіз {noun} туралы сұрап отырған шығарсыз. Нақтыласаңыз — нақтырақ жауап беруге тырысамын.",
]

[[families]]
key = "unknown.clarify_no_topic"
templates = [
    "Сұрағыңызды толық түсінбедім. Қандай тақырып туралы сұрап отырсыз? Аздап нақтылап жіберіңізші.",
    "Кешіріңіз, сұрағыңыздың мәнін дәл аңғара алмадым. Қандай нәрсе жайында сөз болып тұр?",
    "Сұрағыңыз жайында кеңірек айтып жіберсеңіз — қандай тақырыпқа қатысты екенін түсінсем, көмек етуге тырысамын.",
    "Менің түсінуімше сұрағыңыз бар, бірақ нақты тақырыпты ажырата алмадым. Қайталап, басқаша тұжырымдап көріңізші.",
    "Сізді дұрыс түсіну үшін сұрағыңызды нақтылай түсіңізші — қандай тақырып туралы сұрап тұрсыз?",
]

# **v4.53.5** — Context-aware clarify. Routes from the planner when
# `unknown.clarify_no_topic` / `unknown.clarify_low_confidence` would
# normally fire AND the session has stored slots
# (name / occupation / activity / city). Surfaces the stored context
# explicitly so the user sees WHAT the system already knows about
# them and which slot the system is offering as a guess — replaces
# the generic "сұрағыңызды нақтылай түсіңізші" catch-all that the
# user's session 5 transcript flagged. Each variant gates on a
# different slot subset; `template_is_fillable` filters to the
# applicable subset.
[[families]]
key = "unknown.with_session_diagnostic"
templates = [
    # All three primary slots — full context-aware diagnostic.
    "{name}, сұрағыңызды дәл түсінбедім. Менде сіздің мамандығыңыз ({occupation}) және ағымдағы ісіңіз ({activity}) сақталған. Қайсысы туралы сұрап отырсыз?",
    # Name + occupation — no activity stored.
    "{name}, сізді {occupation} деп білемін. Сұрағыңыз мамандығыңызға қатысты ма, әлде басқа тақырыпта ма? Аздап нақтылаңызшы.",
    # Name + activity — no occupation stored.
    "{name}, сіз {activity} жайлы айтқан болатынсыз. Сұрағыңыз сол ағымдағы ісіңіз туралы ма, әлде басқа нәрсе ме? Анығырақ айтсаңыз болады.",
    # Activity only (no name) — recall the activity slot.
    "Менде сіздің ағымдағы ісіңіз ({activity}) есте. Сұрағыңыз сол туралы ма, әлде басқа тақырыпты сұрап тұрсыз ба?",
    # Occupation only (no name).
    "Сіздің мамандығыңыз ({occupation}) деп жадымда. Сұрағыңыз мамандығыңызға қатысты ма, әлде басқа тақырыпта ма?",
    # City only — fallback when only location is known.
    "Кешіріңіз, сұрағыңыздың дәл мәнін аңғара алмадым. Әңгіме сіз тұратын {city} туралы ма, әлде басқа тақырыпта ма?",
    # Name only — minimal context, but cite the name so the user
    # sees that adam tracks who they are.
    "{name}, қандай тақырып бойынша көмектесейін? Сұрағыңызды нақтылай түсіңізші — қажет болса аты-жөніңізді де қайта айтып шығармын.",
]

# v1.9.5: Unknown with *adapted* retrieval evidence — the retrieved
# quote was rewritten by `compose_with_city` (ComposeMode::InSampleCitySwap)
# so at least one city mention was swapped to the user's session city.
# Traceability contract: when we change the source text, the user MUST
# be told. Every template here explicitly frames the quote as
# "adapted" / "your city's version" / "rewritten for you" — never
# presents the adapted text as if it were the original corpus line.
#
# The planner (v1.9.5) routes Intent::Unknown with example_adapted=true
# to this family instead of `unknown.with_evidence`, so the two paths
# cannot be confused at runtime.
[[families]]
key = "unknown.with_adapted_evidence"
templates = [
    # Neutral — no session slots beyond city required (city is always
    # present when we reach this family, since it triggered the swap).
    "{city|locative} болғандықтан мынадай бейімделген мысал ұсынамын: «{example}»",
    "{noun} туралы корпустағы бір жолды сіздің қалаңызға бейімдеп көрдім: «{example}»",
    "Бұл бейімделген нұсқа (түпнұсқада басқа қала аталған): «{example}»",
    # Name-aware — when the session also has a name.
    "{name_respect}, мен {noun} туралы бір жолды сіздің {city|locative} болуыңызға сай бейімдедім: «{example}»",
    "{name_respect}, бейімделген мысал (түпнұсқадан өзгертілген): «{example}»",
]

# v2.7 — Unknown with rule-derived reasoning chain. When the reasoner
# (adam_reasoning::reasoner::run) produces a DerivedFact involving the
# user's noun_hint, the chain is rendered into Kazakh prose and routed
# here. Every template in this family contains the marker stem
# «байланыс-» ("connect-/relate-"), mirroring the v1.9.5 «бейімд-»
# marker for adapted evidence. Users can grep for «байланыс-» as a
# runtime signal that the response is inferred, not retrieved.
[[families]]
key = "unknown.with_derived_chain"
templates = [
    "{noun} туралы мынадай байланыс анықтадым: {chain}.",
    "Айтуыңыз бойынша, мынадай қисынды байланыс бар: {chain}.",
    "Қолда бар деректерден байланыс құрастырдым: {chain}.",
    "{name_respect}, {noun} жайында мен мынадай байланысты таптым: {chain}.",
]


# v4.0.34 — Phase 5 part 2 (Codex roadmap). Explicit conflict-
# surfacing family. Selected by `plan_response_with_epistemic` when
# `intent == Unknown`, `noun_hint.is_some()`, and
# `EpistemicStatus::Conflicted`. Templates consume three slots
# populated by `Conversation::turn_with_trace` from
# `belief.contradictions.last()`:
#   - {predicate} — the field that disagrees (e.g. "city", "name")
#   - {old_value} — the earlier claim
#   - {new_value} — the current claim
# The user is explicitly asked which claim is correct rather than
# the system silently picking one.
[[families]]
key = "unknown.conflicted"
templates = [
    "Сіз бұрын {predicate} — {old_value} дедіңіз, енді {new_value} дейсіз. Қайсысы дұрыс?",
    "Түсінбедім: {predicate} {old_value} ма, әлде {new_value} ма?",
    "{predicate} туралы екі жауап алдым: {old_value} және {new_value}. Нақтылай аласыз ба?",
]

# v4.0.34 — Phase 5 part 2. Soft-hedging family. Selected when
# `intent == Unknown`, `noun_hint.is_some()`, and
# `EpistemicStatus::Tentative` (typically: goal set but the Phase 4
# verifier flagged MissingEvidence, so evidence was stripped before
# render). Marks the response as uncertain and invites more context
# instead of pretending to know.
[[families]]
key = "unknown.tentative"
templates = [
    "Бәлкім, {noun} туралы айтасыз ба",
    "{noun} жайында анық емес — көбірек айта аласыз ба",
    "{noun} туралы нақтырақ не білгіңіз келеді",
]

# **v4.93.5** — Codex 2026-05-07 audit P2 pedagogical intents.
# Surface curated tutor content via topic-specific slots populated
# by `crate::pedagogical::*` lookups in planner.rs. Each family has
# topic-bearing AND topic-less variants — `template_is_fillable`
# filters to the applicable subset based on slot presence.

# AskExercise — user asks for a practice task. Topic-bearing variant
# surfaces the curated exercise body; topic-less variant requests
# clarification.
[[families]]
key = "ask_exercise"
templates = [
    "{topic} тақырыбы бойынша жаттығу: {exercise_body}",
    "Тапсырма ({topic}): {exercise_body}",
    "Қазір {topic} жаттығуын беремін: {exercise_body}",
    "Жаттығу қандай тақырып бойынша қалайсыз? Мысалы: ownership, lifetimes, traits, async, error handling, iterators.",
    "Қандай тақырыпта жаттығайын деп тұрсыз? Айтыңызшы — нақты тапсырма беремін.",
]

# CodeRequest — user asks for a code example. Topic-bearing variant
# surfaces the curated snippet; topic-less variant requests
# clarification (per Codex directive: never free-generate).
[[families]]
key = "code_request"
templates = [
    "{topic} мысалы:\n{code_snippet}",
    "Міне {topic} коды:\n{code_snippet}",
    "{topic} үшін қарапайым snippet:\n{code_snippet}",
    "Қандай тақырыпта код керек? Мысалы: hello world, ownership, borrow, struct, vec, async, future, stream.",
    "Менде сол тақырыпта тексерілген snippet жоқ. Қандай нақты мысал ұсынғым келеді — айтыңызшы.",
]

# ExplainCompilerError — user pastes an error or asks about an
# E-code. Code-bearing variant surfaces the curated explanation;
# code-less variant requests the actual error text or code.
[[families]]
key = "explain_compiler_error"
templates = [
    "{error_explanation}",
    "{error_code}: {error_explanation}",
    "Бұл қате — Rust компиляторының {error_code} коды. {error_explanation}",
    "Қателіктің нөмірін (E0xxx) немесе compiler хабарының бірінші жолын жіберіңізші — нақты түсіндіремін.",
    "Менде нақты сол қатенің түсіндірмесі әлі жоқ. Қате толық хабарын немесе кодын жіберіңіз.",
]

# AskPurpose — user asks "what is X for / purpose of X". Topic-
# bearing variant surfaces the curated purpose statement; topic-
# less variant requests clarification.
[[families]]
key = "ask_purpose"
templates = [
    "{purpose_body}",
    "{topic}-тің мақсаты: {purpose_body}",
    "Қандай ұғымның мақсатын білгіңіз келеді? Мысалы: ownership, borrow, lifetimes, trait, future, pin.",
    "Қай тақырыптың мақсаты туралы сұрап тұрсыз — нақтылап беріңізші.",
]

# **v4.95.0** — Codex P3 follow-up #5: cargo-check loop wired into
# the dialog. When a student submits a Rust solution (triple-backtick
# code block), `Intent::SubmitSolution` fires, the planner runs
# `crate::cargo_verify::verify_snippet`, populates `cargo_status` +
# (on failure) `error_code` / `error_explanation` / `raw_excerpt`,
# and routes to one of four sub-families based on the verdict.

[[families]]
key = "submit_solution.passed"
templates = [
    "Жарайсыз! Кодыңыз `cargo check`-тен тазалап өтті. `cargo run` арқылы орындап көріңіз.",
    "Код компиляцияланды. Мазмұны дұрыс — компилятор қарсы шықпады.",
    "Жақсы! Кодыңыз type-checker-ді өтті. Ендiгi қадам — тестi жазып, мінез-құлықты тексеру.",
]

[[families]]
key = "submit_solution.failed_known"
templates = [
    "Кодыңызда қате бар: **{error_code}**.\n\n{error_explanation}\n\nКомпилятор хабары:\n```\n{raw_excerpt}\n```",
    "**{error_code}** қатесі шықты.\n\n{error_explanation}",
]

[[families]]
key = "submit_solution.failed_unknown"
templates = [
    "Кодыңыз компиляция кезінде қате береді. Менде осы нақты қатенің тегі жоқ. Compiler хабары:\n```\n{raw_excerpt}\n```\n\nҚайталап қарап шығыңыз — `cargo check` жергілікте де іске қосып көріңіз.",
    "Қате шықты — толық тегі менде жоқ. Компилятор хабары:\n```\n{raw_excerpt}\n```",
]

[[families]]
key = "submit_solution.env_error"
templates = [
    "Cargo жоққа шығарылды (PATH-та табылмады?). Кодты жергілікте `cargo check` арқылы орындап, нәтижесін айтыңыз.",
    "Менде cargo шакыру мүмкіндігі әзірге жоқ. Кодыңызды жергілікте `cargo run` арқылы тексеріп көріңіз.",
]
