    "Дұрыс емес: сіз {check_unknown} = {check_user_value} деп жаздыңыз, ал дұрысы {check_unknown} = {check_correct_value}.",
    "{check_unknown} = {check_user_value} — дұрыс емес. Дұрыс жауап: {check_unknown} = {check_correct_value}.",
