[[families]]
key = "current_progress.recap"
templates = [
    "Сіздің қазіргі прогресіңіз:\n\n{progress_recap}",
    "Курс бойынша жағдайыңыз:\n\n{progress_recap}",
    "Міне, ағымдағы көрініс:\n\n{progress_recap}",
]

# **v4.99.0** — empty-progress recap — fires when student asks
# «прогресім қандай?» but no exercises have been submitted yet.
[[families]]
key = "current_progress.empty"
templates = [
    "Әзірге бір де жаттығу шешілмеген. Бастау үшін **{next_stage_label_kk}** тақырыбынан жаттығу сұраңыз.",
    "Курсты әлі бастамадыңыз. Алғашқы тақырып — **{next_stage_label_kk}**; оған жаттығу сұрап көріңіз.",
]

# **v4.96.0** — Codex round-2 audit Bug 7. Cross-language contrast
# templates. When the user asks «Python-да ownership бар ма?» or
# similar, route here instead of surfacing the Rust ownership
# definition without contrast. Sub-key on whether curated contrast
# body exists (covers the most-frequent (lang, concept) pairs).
[[families]]
key = "cross_language_contrast.with_body"
templates = [
    "{contrast_body}",
    "{other_language} мен Rust арасындағы {rust_concept} салыстыруы:\n\n{contrast_body}",
]

[[families]]
key = "cross_language_contrast.no_body"
templates = [
    "{other_language}-да Rust-тағы {rust_concept} ұғымының тура аналогі менде нақты жазылмаған әлі. Жалпы тілдердің көбі бұл механизмді басқаша шешеді (GC, манual мемory, reference count). Қажет болса, нақты қандай аспект қызықтыратынын жазсаңыз — нақтылап беремін.",
    "Менде {other_language} мен Rust-тағы {rust_concept}-тің салыстыруы әлі курсталмаған. Сұрақты нақтылыр аласыз ба — perfomance, safety, синтаксис қайсысы керек?",
]
