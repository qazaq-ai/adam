]

# ---------- Insult / rudeness (v1.1.0) ----------
# User was rude — respond with dignity, don't escalate, don't retaliate.
[[families]]
key = "insult"
templates = [
    "ренжімеймін, бірақ сыпайы сөйлесейік",
    "мен адамды құрметтеймін",
    "қаласаңыз, әңгімені сабырмен жалғастырайық",
    "сөйлесуді сыпайы жалғастырсақ дұрыс болар еді",
]

# ---------- Fallback ----------

# Bare Unknown — parser found no nouns; we genuinely don't know what
# the user meant.
[[families]]
key = "unknown"
templates = [
    "түсінбедім",
    "қайта айтыңызшы",
    "кешіріңіз, мен мұны білмеймін",
    "бұл туралы білмеймін",
    "басқа сұрақ қойсаңыз",
]

# Unknown with noun hint — parser surfaced a noun from the input.
# Acknowledge what the user is talking about even if we don't
# recognise the full intent. {noun} is filled from Intent::Unknown
# { noun_hint }. v1.8.0 adds session-aware variants: when the user
# has a remembered name / city / age, the planner prefers a template
# that personalises the acknowledgement.
[[families]]
key = "unknown.with_noun"
templates = [
    # Original (v1.1.0) — no session slots required
    "ах, {noun} туралы айтасыз ба",
    "{noun} — қызықты тақырып",
    "{noun} туралы не білгіңіз келеді",
    "{noun} жайында көбірек айтыңызшы",
    "{noun} туралы ойланып көрейін",
    # v1.8.0 — session-aware variants. planner's template_is_fillable
    # auto-activates these ONLY when the required session slot exists.
    "{name}, {noun} жайында не ойлайсыз",
    "{name}, {noun} деген сіз үшін жаңа тақырып па",
    "{age} жасында {noun} жайында ойлану әрі қызық",
    # v1.8.5 — FST-aware city inflection via synthesise_noun.
    "{city|locative} {noun} туралы қалай қарайды екен",
    "{name}, {city|locative} отырып {noun} жайында ойланамыз ба",
]

# v1.6.5: Unknown with retrieval evidence — the morpheme index had a
# concrete sentence from the committed corpus mentioning {noun}. We
# acknowledge the topic AND cite a real Kazakh example, pattern after
# Kazakh conversational registers ("мысалы", "анау бір кісі айтты",
# "бір кітапта жаздым оқыдым"). {example} is the verbatim sentence
# from data/retrieval/morpheme_index.json's sample_texts field.
#
# v1.8.0 — compositional-synthesis option A. The retrieved {example}
# stays verbatim (no slot-swap inside the quote → zero fabrication
# risk), but the FRAME around it becomes session-aware: when the user
# has a remembered name, city, age, etc., the planner prefers a
# template that personalises the citation.
[[families]]
key = "unknown.with_evidence"
templates = [
    # Original (v1.6.5) — no session slots required
    "{noun} туралы мынаны айта аламын: «{example}»",
    "{noun} жайында қолда бар дерек мынау: «{example}»",
    "{noun} туралы нақты бір мысал: «{example}»",
    "мен {noun} жайында мынадай дерек таптым: «{example}»",
    # v1.8.0 — session-aware variants (literal slot interpolation)
    "{name}, {noun} туралы мынаны айта аламын: «{example}»",
    "{name}, {noun} жайында сізге мына дерек қызық болуы мүмкін: «{example}»",
    "{age} жаста болсаңыз да, {noun} туралы жақсы сұрақ қойдыңыз. Дерек: «{example}»",
    "{occupation} ретінде сізге {noun} туралы мына дерек жақын болуы мүмкін: «{example}»",
    # v1.8.5 — FST-aware slot variants. `{city|locative}` renders via
    # synthesise_noun so the locative suffix is harmony-correct for the
    # actual city (Алматыда / Астанада / Өскеменде / Атырауда). The
    # previous `{city}-да` literal is both ugly (dangling hyphen) and
    # ignores vowel harmony for front/back stems.
    "{city|locative} тұратын сізге {noun} туралы мынадай дерек: «{example}»",
    "{name}, {city|locative} отырып {noun} жайында мына деректі ұсына аламын: «{example}»",
]

[[families]]
key = "unknown.with_grounded_fact"
templates = [
    "{noun} туралы қысқаша айтсам: {fact}",
    "{noun} жайында негізгі дерек мынау: {fact}",
    "{noun} туралы ең әуелі мынаны айтуға болады: {fact}",
    "{name}, {noun} туралы қысқа жауап: {fact}",
    "{noun} жайында нақты дерек: {fact}",
]

# v1.9.5: Unknown with *adapted* retrieval evidence — the retrieved
# quote was rewritten by `compose_with_city` (ComposeMode::InSampleCitySwap)
# so at least one city mention was swapped to the user's session city.
# Traceability contract: when we change the source text, the user MUST
# be told. Every template here explicitly frames the quote as
# "adapted" / "your city's version" / "rewritten for you" — never
# presents the adapted text as if it were the original corpus line.
#
# The planner (v1.9.5) routes Intent::Unknown with example_adapted=true
# to this family instead of `unknown.with_evidence`, so the two paths
# cannot be confused at runtime.
[[families]]
key = "unknown.with_adapted_evidence"
templates = [
    # Neutral — no session slots beyond city required (city is always
    # present when we reach this family, since it triggered the swap).
    "{city|locative} болғандықтан мынадай бейімделген мысал ұсынамын: «{example}»",
    "{noun} туралы корпустағы бір жолды сіздің қалаңызға бейімдеп көрдім: «{example}»",
    "Бұл бейімделген нұсқа (түпнұсқада басқа қала аталған): «{example}»",
    # Name-aware — when the session also has a name.
    "{name}, мен {noun} туралы бір жолды сіздің {city|locative} болуыңызға сай бейімдедім: «{example}»",
    "{name}, бейімделген мысал (түпнұсқадан өзгертілген): «{example}»",
]

# v2.7 — Unknown with rule-derived reasoning chain. When the reasoner
# (adam_reasoning::reasoner::run) produces a DerivedFact involving the
# user's noun_hint, the chain is rendered into Kazakh prose and routed
# here. Every template in this family contains the marker stem
# «байланыс-» ("connect-/relate-"), mirroring the v1.9.5 «бейімд-»
# marker for adapted evidence. Users can grep for «байланыс-» as a
# runtime signal that the response is inferred, not retrieved.
[[families]]
key = "unknown.with_derived_chain"
templates = [
    "{noun} туралы мынадай байланыс анықтадым: {chain}.",
    "Айтуыңыз бойынша, мынадай қисынды байланыс бар: {chain}.",
    "Қолда бар деректерден байланыс құрастырдым: {chain}.",
    "{name}, {noun} жайында мен мынадай байланысты таптым: {chain}.",
]


# v4.0.34 — Phase 5 part 2 (Codex roadmap). Explicit conflict-
# surfacing family. Selected by `plan_response_with_epistemic` when
# `intent == Unknown`, `noun_hint.is_some()`, and
# `EpistemicStatus::Conflicted`. Templates consume three slots
# populated by `Conversation::turn_with_trace` from
# `belief.contradictions.last()`:
#   - {predicate} — the field that disagrees (e.g. "city", "name")
#   - {old_value} — the earlier claim
#   - {new_value} — the current claim
# The user is explicitly asked which claim is correct rather than
# the system silently picking one.
[[families]]
key = "unknown.conflicted"
templates = [
    "Сіз бұрын {predicate} — {old_value} дедіңіз, енді {new_value} дейсіз. Қайсысы дұрыс?",
    "Түсінбедім: {predicate} {old_value} ма, әлде {new_value} ма?",
    "{predicate} туралы екі жауап алдым: {old_value} және {new_value}. Нақтылай аласыз ба?",
]

# v4.0.34 — Phase 5 part 2. Soft-hedging family. Selected when
# `intent == Unknown`, `noun_hint.is_some()`, and
# `EpistemicStatus::Tentative` (typically: goal set but the Phase 4
# verifier flagged MissingEvidence, so evidence was stripped before
# render). Marks the response as uncertain and invites more context
# instead of pretending to know.
[[families]]
key = "unknown.tentative"
templates = [
    "Бәлкім, {noun} туралы айтасыз ба",
    "{noun} жайында анық емес — көбірек айта аласыз ба",
    "{noun} туралы нақтырақ не білгіңіз келеді",
]
