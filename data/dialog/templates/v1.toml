    "{name_respect}, {noun} жайында не ойлайсыз",
    "{name_respect}, {noun} деген сіз үшін жаңа тақырып па",
    "{age} жасында {noun} жайында ойлану әрі қызық",
    # v1.8.5 — FST-aware city inflection via synthesise_noun.
    "{city|locative} {noun} туралы қалай қарайды екен",
    "{name_respect}, {city|locative} отырып {noun} жайында ойланамыз ба",
]

# v1.6.5: Unknown with retrieval evidence — the morpheme index had a
# concrete sentence from the committed corpus mentioning {noun}. We
# acknowledge the topic AND cite a real Kazakh example, pattern after
# Kazakh conversational registers ("мысалы", "анау бір кісі айтты",
# "бір кітапта жаздым оқыдым"). {example} is the verbatim sentence
# from data/retrieval/morpheme_index.json's sample_texts field.
#
# v1.8.0 — compositional-synthesis option A. The retrieved {example}
# stays verbatim (no slot-swap inside the quote → zero fabrication
# risk), but the FRAME around it becomes session-aware: when the user
# has a remembered name, city, age, etc., the planner prefers a
# template that personalises the citation.
[[families]]
key = "unknown.with_evidence"
templates = [
    # Original (v1.6.5) — no session slots required
    "{noun} туралы мынаны айта аламын: «{example}»",
    "{noun} жайында қолда бар дерек мынау: «{example}»",
    "{noun} туралы нақты бір мысал: «{example}»",
    "мен {noun} жайында мынадай дерек таптым: «{example}»",
    # v1.8.0 — session-aware variants (literal slot interpolation)
    "{name_respect}, {noun} туралы мынаны айта аламын: «{example}»",
    "{name_respect}, {noun} жайында сізге мына дерек қызық болуы мүмкін: «{example}»",
    "{age} жаста болсаңыз да, {noun} туралы жақсы сұрақ қойдыңыз. Дерек: «{example}»",
    "{occupation} ретінде сізге {noun} туралы мына дерек жақын болуы мүмкін: «{example}»",
    # v1.8.5 — FST-aware slot variants. `{city|locative}` renders via
    # synthesise_noun so the locative suffix is harmony-correct for the
    # actual city (Алматыда / Астанада / Өскеменде / Атырауда). The
    # previous `{city}-да` literal is both ugly (dangling hyphen) and
    # ignores vowel harmony for front/back stems.
    "{city|locative} тұратын сізге {noun} туралы мынадай дерек: «{example}»",
    "{name_respect}, {city|locative} отырып {noun} жайында мына деректі ұсына аламын: «{example}»",
]

# **v4.43.0** — Stage A bundle 3: introducer migration.
# Pre-v4.43.0 this family had 5 templates each embedding an introducer
# preamble in the literal text. v4.43.0 lifted introducer choice into
# the planner via `crate::nlg::pick_introducer` + `compose_introducer`
# (see `apply_introducer_migration` in planner.rs); the templates here
# now display the planner-pre-wrapped `{fact}` slot. Output is
# byte-identical to v4.42.x for any `(seed, has_name_respect, fact)`.
[[families]]
key = "unknown.with_grounded_fact"
templates = [
    "{fact}",
]

# v4.33.5 — first SemFrame-driven response family. When the input
# carried sentence-level negation («X емес»), `populate_sentential_negation`
# marks the noun frame Negated; `Conversation::turn` copies that onto
# `Intent::Unknown.noun_hint_polarity`; planner routes here.
#
# Asserting a definition («X — Y») would contradict the user's claim.
# The templates here acknowledge the negation respectfully without
# making any positive claim about X — adam doesn't have access to the
# user's mental model and can't verify the negation. The wording uses
# «емес» echoed back so the user sees their own negation reflected,
# and «пікіріңіз / ойыңыз» («your view / opinion») to mark the
# epistemic status as user-asserted rather than adam-asserted.
# v4.37.0 — inversion-question family. When the input is «X емес пе?»
# (confirmation-seeking inversion: "isn't X the case?"), the speaker
# EXPECTS X to be true and is asking adam to confirm or hedge. NOT a
# denial. Templates engage with the confirmation-seeking shape:
# acknowledge the question, hedge honestly (no flat assertion), and
# avoid the negation-acknowledgment phrasing that would misread the
# speaker's intent.
[[families]]
key = "unknown.with_inversion_question"
templates = [
    "Иә, мүмкін солай шығар — нақты дерегім жоқ.",
    "{noun} жайында пікіріңіз орынды деп ойлаймын.",
    "Иә, мен де солай ойлаймын — бірақ нақтысын білмеймін.",
    "Сіздің ойыңыз дұрыс шығар, бірақ растай алмаймын.",
    "{noun} туралы пікіріңізді бағалаймын — бұл ықтимал.",
    # No-noun variants (when noun_hint is None)
    "Иә, бұл мүмкін болуы — нақтысын білмеймін.",
    "Сіздің ойыңыз орынды деп ойлаймын.",
]

[[families]]
key = "unknown.with_negated_topic"
templates = [
    "{noun} емес деп айтасыз — пікіріңізді сыйлаймын.",
    "{noun} емес туралы пікіріңізді түсіндім.",
    "{noun} жайында дау айтуға деректерім жетпейді — сіздің ойыңызды сыйлаймын.",
    "{noun} емес деп ойлайсыз; мен бұл туралы дау айтуға бара алмаймын.",
    "Түсіндім: {noun} емес деген пікір. Бұл туралы өзімде нақты дерек жоқ.",
