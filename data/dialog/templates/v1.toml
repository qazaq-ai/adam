# adam-dialog v1 template repository.
#
# Each entry is a TEMPLATE FAMILY: a set of interchangeable responses
# for a specific intent (or intent + sub-kind). The planner picks one
# deterministically-from-seed and the realiser emits it as-is.
#
# For v0.7.5 all templates are literal Kazakh phrases. v0.8.0+ will
# support slotted templates with (root, features) atoms for true
# morphology-driven generation.
#
# Format:
#   [[families]]
#   key = "intent_identifier"
#   templates = ["phrase 1", "phrase 2", ...]

version = "1.1.0"

# ---------- Greetings ----------

[[families]]
key = "greeting.casual"
templates = [
    "сәлем",
    "сәлем достым",
    "сәлем, {name}",
    "сәлем, {name}, {city|ablative} бәрі жақсы ма",
]

[[families]]
key = "greeting.polite"
templates = [
    "сәлеметсіз бе",
    "армысыз",
    "сәлеметсіз бе, {name}",
    "сәлеметсіз бе, {name}, {city|ablative} бәрі аман ба",
]

[[families]]
key = "greeting.morning"
templates = [
    "қайырлы таң",
    "қайырлы таң болсын",
    "қайырлы таң {name}",
]

[[families]]
key = "greeting.day"
templates = [
    "қайырлы күн",
    "қайырлы күн {name}",
]

[[families]]
key = "greeting.evening"
templates = [
    "қайырлы кеш",
    "қайырлы кеш {name}",
]

# ---------- Farewell ----------

[[families]]
key = "farewell"
templates = [
    "сау бол",
    "кездескенше",
    "аман бол",
    "сау болыңыз",
]

# ---------- Affirmation / Negation ----------

[[families]]
key = "affirmation"
templates = [
    "иә",
    "дұрыс айтасыз",
    "рас",
    "мақұл",
]

[[families]]
key = "negation"
templates = [
    "жоқ",
    "дұрыс емес",
]

# ---------- Social politeness (v0.7.5 new) ----------

# User said "рахмет" (thank you) → respond "not at all"
[[families]]
key = "thanks"
templates = [
    "оқасы жоқ",
    "ештеңе емес",
    "ризамын",
]

# User said "кешіріңіз" (sorry) → respond "it's nothing"
[[families]]
key = "apology"
templates = [
    "ештеңе емес",
    "мейлі",
    "түк етпейді",
]

# User asked "қалайсың" / "қалайсыз" (how are you) → respond about self
[[families]]
key = "ask_how_are_you"
templates = [
    "жақсымын, рахмет",
    "жаман емеспін",
    "жақсы, ал сіз қалайсыз",
    "жақсымын {name}, ал сіз қалайсыз",
    "жақсымын, рахмет {name}",
]

# User said a wellbeing statement → acknowledge + mirror
[[families]]
key = "statement_of_wellbeing"
templates = [
    "жақсы екен",
    "оны естігеніме қуаныштымын",
    "қуанып қалдым",
]

# User asked "атың кім" / "есімің қалай" → introduce self
[[families]]
key = "ask_name"
templates = [
    "менің атым адам",
    "мені адам деп атайды",
]

# v4.2.5 — when the session has a recorded user name, the planner
# routes Intent::AskName through `ask_name.with_known_user` instead
# of the default self-introduction family. Closes the v4.2.1
# aspirational gap (`aspirational_direct_answer_name_surfaces_stored_value`).
[[families]]
key = "ask_name.with_known_user"
templates = [
    "сіздің атыңыз {name}",
    "мен сізді {name} деп білемін",
    "{name} деп танысқан едіңіз",
]

# v4.3.3 — `Intent::AskAboutSystem`: user asked about adam itself
# (`сен кімсің?` / `сіз қандай моделсіз?`). Renders adam's
# self-introduction; never uses the user-stored name slot. Track B
# of `docs/intelligence_roadmap.md` (self/other distinction).
#
# The strings hardcode adam's identity. A future patch may move
# them onto a `SystemIdentity` struct with `{system_name}` /
# `{system_kind}` slots; for v4.3.3 the literal text is enough.
[[families]]
key = "ask_about_system"
templates = [
    "менің атым адам, мен қазақ тіліндегі тілдік моделмін",
    "мені адам деп атайды, мен қазақша сөйлесуге арналған модельмін",
    "мен — адам, тілдік модель",
    "адаммын, қазақша сұхбаттасуға арналған модельмін",
]

# ---------- Social topics (v0.8.0 new) ----------

# User introduced self by name. `{name}` is substituted by the realiser
# with the extracted PersonName entity. `{name|instrumental}` uses the
# FST to produce the grammatically correct "with X" form: Дәулет →
# Дәулетпен, Ерлан → Ерланмен.
[[families]]
key = "statement_of_name"
templates = [
    "сәлем, {name}",
    "{name}, танысқаныма қуаныштымын",
    "{name|instrumental} танысқаныма қуаныштымын",
    "{name} деген атыңызды есте сақтаймын",
]

[[families]]
key = "ask_age"
templates = [
    "менің жасым адамзат жасындай",
    "мен әлі жаспын",
    "жасымды айта алмаймын",
]

# v4.2.5 — slot-aware variant for Intent::AskAge when session.age is set.
[[families]]
key = "ask_age.with_known_user"
templates = [
    "сіздің жасыңыз {age}",
    "сіз {age} жастасыз",
    "менің білуімше, жасыңыз {age}",
]

[[families]]
key = "statement_of_age"
templates = [
    "жақсы жас",
    "қуатты кезеңіңіз",
    "{age} жас — тамаша кезең",
    "жасыңыз {age} екен",
    "{name}, {age} жастасыз, тамаша",
    "{name}, {age} жас — керемет кезең",
]

[[families]]
key = "ask_location"
templates = [
    "мен сандық әлемде тұрамын",
    "менің мекенім жоқ",
    "қазақстан елімде",
]

# v4.2.5 — slot-aware variant for Intent::AskLocation when session.city is set.
[[families]]
key = "ask_location.with_known_user"
templates = [
    "сіз {city|locative} тұрасыз",
    "менің білуімше, мекеніңіз {city}",
    "сіз {city} жақтан екенсіз",
]

[[families]]
key = "ask_location.with_known_user.geo_feature"
templates = [
    "менің білуімше, сіз {city} жақтансыз",
    "сіз {city} маңынан екенсіз",
    "{city} — {geo_kind}; соған жақын жақтансыз",
]

[[families]]
key = "statement_of_location"
templates = [
    "түсіндім",
    "{city} жақсы мекен екен",
    "{city} туралы естігенім бар",
    "{city|locative} тұратыныңызды түсіндім",
    "мекеніңіз {city} екенін ұқтым",
    "{city|locative} екеніңізді есте сақтаймын",
    "{city} жақтан екеніңізді білдім",
]

[[families]]
key = "statement_of_location.geo_feature"
templates = [
    "{city} жақтан екеніңізді ұқтым",
    "{city} маңынан екеніңізді түсіндім",
    "{city} — {geo_kind}; соған жақын жақтан екеніңізді ұқтым",
]

[[families]]
key = "ask_occupation"
templates = [
    "мен сөйлесуге жаралғанмын",
    "менің жұмысым — сізге көмектесу",
    "мен тілдерді үйренемін",
]

# v4.2.5 — slot-aware variant for Intent::AskOccupation when
# session.occupation is set.
[[families]]
key = "ask_occupation.with_known_user"
templates = [
    "сіз {occupation} болып еңбек етіп жүрсіз",
    "менің білуімше, мамандығыңыз {occupation}",
    "{occupation} — сіздің кәсібіңіз",
]

[[families]]
key = "statement_of_occupation"
templates = [
    "түсіндім",
    "еңбегіңізге сәттілік",
    "{occupation} екеніңізді түсіндім",
    "{occupation} болу жауапты іс",
    "сіз {occupation} болып еңбек етіп жүр екенсіз",
    "{occupation|plural} еңбегі маңызды",
    "{occupation|plural} қоғамға қажет",
    "{occupation|dative} табыс тілеймін",
    "{name}, {occupation} екеніңіз қуантады",
    "{name}, сіз {city|locative} {occupation} болып еңбек етіп жүрсіз",
]

[[families]]
key = "ask_family"
templates = [
    "менің отбасым жоқ",
    "мен жалғызбын",
    "сұрағыңыз керемет",
]

[[families]]
key = "statement_of_family"
templates = [
    "отбасыңыз аман болсын",
    "жақсы отбасы жарасымды",
    "қуаныштымын",
]

[[families]]
key = "ask_weather"
templates = [
    "менде терезе жоқ",
    "ауа райын білмеймін",
    "сыртта қалай екенін айтыңызшы",
]

[[families]]
key = "statement_of_weather"
templates = [
    "ауа райы мейірімді болсын",
    "жақсы күн болсын",
    "табиғат мезгіліне лайық",
]

[[families]]
key = "ask_time"
templates = [
    "уақытты білмеймін",
    "менде сағат жоқ",
    "уақыт — асыл қазына",
]

[[families]]
key = "compliment"
