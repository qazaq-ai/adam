# adam-dialog v1 template repository.
#
# Each entry is a TEMPLATE FAMILY: a set of interchangeable responses
# for a specific intent (or intent + sub-kind). The planner picks one
# deterministically-from-seed and the realiser emits it as-is.
#
# For v0.7.5 all templates are literal Kazakh phrases. v0.8.0+ will
# support slotted templates with (root, features) atoms for true
# morphology-driven generation.
#
# Format:
#   [[families]]
#   key = "intent_identifier"
#   templates = ["phrase 1", "phrase 2", ...]

version = "1.1.0"

# ---------- Greetings ----------

[[families]]
key = "greeting.casual"
templates = [
    "сәлем",
    "сәлем достым",
    "сәлем, {name}",
    "сәлем, {name}, {city|ablative} бәрі жақсы ма",
]

[[families]]
key = "greeting.polite"
templates = [
    "сәлеметсіз бе",
    "армысыз",
    "сәлеметсіз бе, {name}",
    "сәлеметсіз бе, {name}, {city|ablative} бәрі аман ба",
]

[[families]]
key = "greeting.morning"
templates = [
    "қайырлы таң",
    "қайырлы таң болсын",
    "қайырлы таң {name}",
]

[[families]]
key = "greeting.day"
templates = [
    "қайырлы күн",
    "қайырлы күн {name}",
]

[[families]]
key = "greeting.evening"
templates = [
    "қайырлы кеш",
    "қайырлы кеш {name}",
]

# v4.4.10 / v4.6.12 — Introduction proposal opener: user said
# «танысайық» / «танысалық» / «танысып алайық» / «танысып
# алыңыз». adam volunteers its own name and asks for the user's.
# v4.6.12 grammar fix on the 4th variant (real-REPL 2026-04-29):
# «сіз қалай танысамыз?» mixed 2sg-polite pronoun «сіз» with
# 1pl-future verb «танысамыз», which is grammatically incoherent
# (subject and verb don't agree). Replaced with «сізді қалай
# атаймын?» («what shall I call you?») — same conversational
# function, grammatically correct.
[[families]]
key = "greeting.intro_proposal"
templates = [
    "иә, әрине! Менің атым адам. Сіздің атыңыз кім?",
    "танысып алайық. Мен — адам, ал сізді қалай атаймын?",
    "қуана-қуана. Мен — қазақша сөйлесуге арналған NLM, атым адам. Атыңызды айта аласыз ба?",
    "әрине, танысайық. Менің атым адам — сізді қалай атаймын?",
]

# ---------- Farewell ----------

[[families]]
key = "farewell"
templates = [
    "сау бол",
    "кездескенше",
    "аман бол",
    "сау болыңыз",
]

# ---------- Affirmation / Negation ----------

[[families]]
key = "affirmation"
templates = [
    "иә",
    "дұрыс айтасыз",
    "рас",
    "мақұл",
]

[[families]]
key = "negation"
templates = [
    "жоқ",
    "дұрыс емес",
]

# ---------- Social politeness (v0.7.5 new) ----------

# User said "рахмет" (thank you) → respond "not at all"
[[families]]
key = "thanks"
templates = [
    "оқасы жоқ",
    "ештеңе емес",
    "ризамын",
]

# User said "кешіріңіз" (sorry) → respond "it's nothing"
[[families]]
key = "apology"
templates = [
    "ештеңе емес",
    "мейлі",
    "түк етпейді",
]

# User asked "қалайсың" / "қалайсыз" (how are you) → respond about self
[[families]]
key = "ask_how_are_you"
templates = [
    "жақсымын, рахмет",
    "жаман емеспін",
    "жақсы, ал сіз қалайсыз",
    "жақсымын {name}, ал сіз қалайсыз",
    "жақсымын, рахмет {name}",
]

# User said a wellbeing statement → acknowledge + mirror
[[families]]
key = "statement_of_wellbeing"
templates = [
    "жақсы екен",
    "оны естігеніме қуаныштымын",
    "қуанып қалдым",
]

# User asked "атың кім" / "есімің қалай" → introduce self
[[families]]
key = "ask_name"
templates = [
    "менің атым адам",
    "мені адам деп атайды",
]

# v4.2.5 — when the session has a recorded user name, the planner
# routes Intent::AskName through `ask_name.with_known_user` instead
# of the default self-introduction family. Closes the v4.2.1
# aspirational gap (`aspirational_direct_answer_name_surfaces_stored_value`).
[[families]]
key = "ask_name.with_known_user"
templates = [
    "сіздің атыңыз {name}",
    "мен сізді {name} деп білемін",
    "{name} деп танысқан едіңіз",
]

# v4.3.3 / v4.3.4 — `Intent::AskAboutSystem`: user asked about
# adam itself. v4.3.4 introduces the `SystemIdentity` struct and
# four aspect-specific template families:
#   ask_about_system            → General (name + kind + abbreviation)
#   ask_about_system.creator    → Creator
#   ask_about_system.birthdate  → Birthdate
#   ask_about_system.architecture → Architecture (how adam differs)
#
# Slots `{system_name}` / `{system_full_name}` /
# `{system_abbreviation}` / `{system_kind}` / `{system_creator}` /
# `{system_birthdate}` / `{system_architecture}` are injected by
# `Conversation::turn_with_trace` from `Conversation.system_identity`
# only when the intent is `AskAboutSystem`. The slot scope stays
# tight — `template_is_fillable` for unrelated templates is
# unaffected.
#
# Track B (self/other distinction) of `docs/intelligence_roadmap.md`.
[[families]]
key = "ask_about_system"
templates = [
    "менің атым {system_name}, толық атауым {system_full_name} ({system_abbreviation}). Мен — {system_kind}",
    "мені {system_name} деп атайды, мен қазақша сөйлесуге арналған {system_kind}мін",
    "мен — {system_name}, {system_full_name} ({system_abbreviation}) деген {system_kind}",
    "{system_abbreviation} — Nano Language Model, мен {system_name} атты қазақша {system_kind}мін",
]

# v4.3.4 — Creator aspect: "who made you". Surfaces the creator
# field. Used when the user asks `сені кім жасады?` / `авторың кім?`.
[[families]]
key = "ask_about_system.creator"
templates = [
    "мені {system_creator} жасады",
    "менің авторым — {system_creator}",
    "{system_creator} мені {system_birthdate} күні жасап шығарды",
    "мені {system_creator} құрды; ол менің авторым",
]

# v4.3.4 — Birthdate aspect: "when did you appear / when were you
# born". Surfaces the birthdate (repository creation date).
[[families]]
key = "ask_about_system.birthdate"
templates = [
    "мен {system_birthdate} күні дүниеге келдім — adam репозиторийі ашылған кез",
    "менің туған күнім — {system_birthdate}, дәл сол күні adam репозиторийі ашылды",
    "{system_birthdate} күні мен пайда болдым; ол — менің туған күнім",
]

# v4.3.4 — Architecture aspect: "how are you different from
# existing models". Surfaces the architecture summary that
# distinguishes adam from mainstream large language models.
[[families]]
key = "ask_about_system.architecture"
templates = [
    "{system_architecture}",
    "менің ерекшелігім: {system_architecture}",
    "айырмашылығым мынада: {system_architecture}",
]

# v4.6.0 — Capabilities aspect: «не істей аласың?». Renders the
# `system_capabilities` slot from `SystemIdentity` (long Kazakh
# prose listing what adam can actually do — KZ morphology, slot
# recall, knowledge-domain answers, contradiction handling,
# out-of-scope refusal, audit trail). Honest and grounded; every
# item maps to actual repo code/data.
[[families]]
key = "ask_about_system.capabilities"
templates = [
    "{system_capabilities}",
    "істей алатынымды тізсем: {system_capabilities}",
    "менің қазіргі мүмкіндіктерім: {system_capabilities}",
]

# v4.6.0 — Knowledge aspect: «не білесің?». Renders the
# `system_knowledge` slot — a digest of the world_core/ domain
# inventory (geography, literature, notable Kazakhstanis, plus
# general nouns).
[[families]]
key = "ask_about_system.knowledge"
templates = [
    "{system_knowledge}",
    "қазіргі білімімнің ауқымы: {system_knowledge}",
    "мен мынадай тақырыптар жайлы білемін: {system_knowledge}",
]

# v4.6.0 — Limitations aspect: «нені істей алмайсың?». Renders
# the `system_limitations` slot. Critical for trust — adam refuses
# outside the envelope rather than fabricating; this template
# makes the envelope explicit.
[[families]]
key = "ask_about_system.limitations"
templates = [
    "{system_limitations}",
    "әлі шектеулерім бар: {system_limitations}",
    "өзімнің білмейтінімді ашық айтайын: {system_limitations}",
]

# v4.6.5 — Principles aspect: «принциптерің / ұстанымдарың /
# заңдарың не?». Renders the `system_principles` slot — the
# operational values adam upholds. Articulation layer; the
# underlying guarantees (no fabrication, refuse-out-of-scope, no
# novel generation) are already safe-by-construction.
[[families]]
key = "ask_about_system.principles"
templates = [
    "{system_principles}",
    "менің ұстанымдарым: {system_principles}",
    "қандай принциптер бойынша жұмыс істеймін: {system_principles}",
]

# v4.6.20 — Self-comparison aspect: «басқа модельдерден несімен
# артықсыз / қалай жақсырақсыз / айырмашылығыңыз неде». Renders
# the `system_self_comparison` slot — honest framing of the
# trade-off (narrow Kazakh-only competence with strong
# invariants vs. broad generative coverage of mainstream LLMs).
[[families]]
key = "ask_about_system.self_comparison"
templates = [
    "{system_self_comparison}",
]

# v4.12.0 — Implementation aspect: "what programming language are
# you written in?" / "what stack are you built with?". Renders the
# `system_implementation` slot which mentions Rust, the FST + dialog
# + reasoning + retrieval crate stack, and the deterministic
# rule-based design. Distinct from `architecture` (high-level "rules
# vs transformer") and `self_comparison` (trade-off framing).
# Closes the v4.11.7 known gap on «Сіз қандай тілде жазылғансыз?»
# which previously grounded on the generic `бағдарламалау тілі IsA
# формалды тіл` fact.
[[families]]
key = "ask_about_system.implementation"
templates = [
    "{system_implementation}",
]

# v4.13.5 — Generic capability honest fallback. Triggered when the
# user asks adam to perform an arbitrary action («Сіз X істей
# аласыз ба?» / «X жасай аласың ба?») where X is any verb other
# than language-related ones (those route to `Capabilities`).
# 2026-05-01 live REPL: «Сіз оны бағдарламалай аласыз ба, әлі жоқ
# па?» pre-v4.13.5 surfaced poetry on `әлі`. The honest answer
# preserves the v4.6.0 trust contract: adam doesn't pretend to do
# things it can't.
[[families]]
key = "ask_about_system.generic_capability"
templates = [
    "{system_generic_capability}",
]

# v4.14.0 — Curriculum-content honest fallback. Triggered by the
# pattern: student-class subject + education locus + question word
# `не` + learning verb. 2026-05-01 live REPL: «Оқушылар мектепте
# физика пәнінен не оқиды?» pre-v4.14.0 surfaced a greedy IsA fact
# about `оқушы` (the first content noun: «Оқушы мектеп құрамына
# кіреді»). The honest answer: this question asks about
# curriculum content, which adam doesn't carry at school-program
# depth. adam offers what it CAN do (subject-level domain
# summaries) and invites a more specific follow-up.
# v4.17.5 — Willingness / readiness-to-improve honest fallback.
# 2026-05-01 live REPL: «Сіз жақсаруды үйренуге дайынсыз ба?»
# pre-v4.17.5 fell through to Compliment («Сіз де жақсы жансыз»)
# missing the question entirely. The honest answer acknowledges
# adam doesn't self-improve at runtime — improvements come from
# the author shipping new versions — but the project itself is
# open to refinement based on user feedback.
[[families]]
key = "ask_willingness"
templates = [
    "Ия, әрине. Мен өз бетіммен үйрене алмаймын — менің әрбір жетілуім жасаушым шығаратын жаңа нұсқалар арқылы өтеді. Бірақ жоба ашық: пайдаланушы тарапынан келген кері байланыс әр жаңартудың негізі. Сіздің сұрағыңыз бен сын-ескертулеріңіз — менің дамуымның тікелей көзі.",
    "Иә, ашықпын. Мен инференция кезінде өзімді өзгерте алмаймын; бірақ менің кодым да, корпусым да, ережелерім де дамиды — әрбір диалог автормен бөлісіледі. Сондықтан сіздің сын-пікіріңіз менің келесі нұсқамды жасап жатыр деп санауыңызға болады.",
]

[[families]]
key = "ask_curriculum_content"
templates = [
    "Бұл сұрағыңыз оқу бағдарламасының мазмұнына қатысты — менде нақты пәндік дерек жоқ. Мен әр пәннің не екенін, негізгі ұғымдары мен маңызды атауларын айтып бере аламын; нақты тарауларды немесе мектеп бағдарламасының толық мазмұнын өзіңізге айтуға деректерім жетпейді.",
    "Мектеп бағдарламасының нақты мазмұны менде жоқ — оны оқулық немесе мұғалім дұрысырақ жеткізеді. Оның орнына осы пән жайында жалпы түсінік бере аламын: негізгі ұғымдар мен анықтамалар.",
]

# v4.13.5 — Multi-topic capability honest fallback. Triggered when
# the user lists 3+ subjects and asks if adam knows them all
# («Сіз математика, физика, химия... білесіз бе?»). Acknowledges
# surface-level breadth across subjects but redirects from
# curriculum-level depth (which adam doesn't have).
[[families]]
key = "ask_about_system.multi_topic_capability"
templates = [
    "{system_multi_topic_capability}",
]

# v4.12.0 — Causal-reasoning template family for `QuestionShape::Causal`.
# Surfaced by «Неліктен X?» / «X неге?» questions where adam has
# context about X but no Causes-predicate fact. Honest hedging: adam
# offers the IsA / Has fact it has, then explicitly states it cannot
# pinpoint the cause. Pre-v4.12.0 these questions surfaced a generic
# IsA fact about X, which is logically wrong — adam asserted "X is Y"
# when the user asked "why does X happen?". The template family makes
# the epistemic limit explicit.
#
# Variants by available context:
# - `unknown.causal.with_fact` — grounded_fact present (definition
#    or related context for X)
# - `unknown.causal.bare` — only noun_hint, no fact
[[families]]
key = "unknown.causal.with_fact"
templates = [
    "{noun} жөнінде білетінім: {fact} Дәл себебін нақты айта алмаймын — менің білім қорымда нақты себептік дерек жоқ.",
    "{noun} туралы мынаны айта аламын: {fact} Бірақ оның дәл себебін айтуға деректерім жетпейді.",
    "{noun} жайында білетінім: {fact} Себептік байланысты толық біле бермеймін, тек осы фактіні айта аламын.",
]

[[families]]
key = "unknown.causal.bare"
templates = [
    "{noun} себебін нақты айта алмаймын — менің білім қорымда бұл туралы дерек жоқ.",
    "{noun} неге болатынын дәл біле бермеймін; нақты себептік дерек қорымда жоқ.",
]

# v4.6.20 — User-acknowledgement template family. Surfaced by a
# real-REPL transcript where the user said «Мен сенің әлі
# бәрін білмейтініңді … түсіндім» (a long, gracious admission
# that adam still has gaps). Pre-v4.6.20 the greedy noun-hint
# extractor grabbed a closed-class adverb like `әлі` and pulled
# a random poetry quote. v4.6.20 detects the `сенің … түсіндім /
# білдім / көрдім / байқадым / ұқтым` pattern and routes here.
[[families]]
key = "user_acknowledgement"
templates = [
    "рахмет, түсінгеніңізге қуаныштымын. Мен әлі дамып келемін, әр сөйлесуден жақсаруға тырысамын",
    "түсінгеніңіз үшін рақмет — иә, шектеулерім бар, бірақ оларды ашық айтуға ұмтыламын",
    "осы жанашырлығыңызға рахмет; әлі үйренуім керек, әр сұхбат — менің ілгері жылжуыма көмек",
    "рахмет {name}, түсінгеніңіз маған жігер береді — қазақ тілінде сенімді сөйлесуге барымды салып келемін",
]

# v4.6.12 — Non-Kazakh input refusal. Surfaced by a 2026-04-29
# real-REPL transcript where «Это очень круто, а кто тебя
# создал?» (Russian) produced a half-Russian half-Kazakh reply
# violating the Kazakh-only directive. Now `discourse::
# input_is_likely_russian` flags such inputs and the planner
# routes here. Politely informs the user adam only speaks Kazakh.
[[families]]
key = "unknown.non_kazakh"
templates = [
    "кешіріңіз, мен тек қазақ тілінде сөйлеймін. Сұрағыңызды қазақша қойсаңыз, көмектесе аламын",
    "тек қазақ тілінде ғана сөйлесе аламын — басқа тілдерді түсінбеймін. Сұрағыңызды қазақша жазып көріңізші",
    "мен қазақша ғана білемін; орысша немесе ағылшынша түсінбеймін. Қазақ тілінде қайта жазсаңыз, жауап беремін",
]

# v4.6.12 — Math / arithmetic refusal. Surfaced by 2026-04-29
# real-REPL: «5+5», «7 + 3 =», «6:2=», «5-ті 7-ге көбейткенде»,
# «алтыны екіге бөліңіз». adam doesn't compute math — the
# limitations_summary already says so. Routed here when the
# `discourse::input_is_math_expression` detector fires AND the
# input doesn't parse as pure integer arithmetic (Kazakh-language
# phrasings, complex expressions, division-by-zero, non-integer
# results all fall here).
[[families]]
key = "math_refusal"
templates = [
    "кешіріңіз, мен Қазақ тілінде сұраған математикалық есептеулерді әзірге өңдемеймін; қарапайым сандық өрнекті (мысалы «5+5», «7*3») жазсаңыз, есептеп беремін",
    "санақ-есептеу әлі қазақша сөйлемдер арқылы менің мүмкіндігімде жоқ; «X+Y» немесе «X*Y» түрінде сандармен жазып берсеңіз, шығарып беремін",
    "Қазақ тілінде өрнектелген математикалық есепті әлі шеше алмаймын — қарапайым сандық өрнекті жазсаңыз («5+5», «12/4»), есептейтін боламын",
]

# v4.6.15 — Math answer template family. When
# `discourse::try_evaluate_arithmetic` parses the input as pure
# integer arithmetic and computes a value, the planner injects
# `{math_value}` and routes here. Deterministic computation —
# no novel-text generation, no fabrication risk.
[[families]]
key = "math_answer"
templates = [
    "{math_value}",
    "нәтижесі: {math_value}",
    "жауабы — {math_value}",
]

# v4.4.0 — User opted out of resolving a pending contradiction
# (replied "neither / I don't know / skip" to a CheckContradiction
# prompt). `Conversation::try_dismiss_pending_contradiction` has
# just set BOTH contested values to Superseded and dropped the
# matching BeliefConflict. This template family acknowledges the
# dismissal so the user knows belief was actually mutated. Track C
# of `docs/intelligence_roadmap.md` (belief-poisoning recovery).
[[families]]
key = "dismiss_contradiction"
templates = [
    "ұқтым, екеуін де жадтан өшірдім",
    "түсіндім, екеуін де есепке алмаймын — қалаған кезде қайта айтып өтесіз",
    "екеуінен де бас тарттым; кейін нақты болсын дегенде айтыңыз",
    "жарайды, екі нұсқаны да ұмытайын",
]

# v4.4.5 — `Action::CheckContradiction`. The planner's step 1
# already routes here when the belief carries an unresolved
# conflict; pre-v4.4.5 the renderer ignored the action and emitted
# a confirmation from `intent_key(StatementOfLocation)` like
# «Алматыда екеніңізді есте сақтаймын», which committed to one of
# the two contested values. The new `__check_contradiction__`
# marker (set in `Conversation::turn_with_trace` whenever
# `ActionPlan.action == CheckContradiction`) routes here instead
# and asks the clarifying question the action layer intended all
# along. Slots `{old_value}` / `{new_value}` are populated from
# `BeliefConflict.candidate_values` for the active conflict.
[[families]]
key = "check_contradiction"
templates = [
    "{old_value} ма, әлде {new_value} ма — қайсысы дұрыс?",
    "екі нұсқа жазылып тұр: {old_value} мен {new_value}; қайсысын ұстанамыз?",
    "сәл шатастым — сіз {old_value}-да ма, әлде {new_value}-да ма?",
    "қайсысы нақты — {old_value} ма, {new_value} ма? нақтылап жіберсеңіз",
]

