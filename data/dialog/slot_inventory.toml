# ── Misc dialog slots referenced by templates ─────────────────────
[[slots]]
name = "example"
kind = "curated_fact"
description = "Verbatim corpus quote retrieved by adam-retrieval for unknown.with_evidence templates."
example = "«Не болса о болсын, айды аспанға бір шығардым»"
variants = ["literal"]

[[slots]]
name = "noun_hint"
kind = "noun_term"
description = "Topic-extraction noun hint, before disambiguation. Used by unknown.with_noun fallback templates."
example = "жер"
variants = ["literal"]

[[slots]]
name = "name_respect_distinct"
kind = "person_name"
description = "Sentinel marker — non-empty when {name_respect} is structurally different from {name} (i.e. the respectful transformation actually fired). Used by templates that conditionally include the address form."
example = "1"
variants = ["literal"]

[[slots]]
name = "raw_excerpt"
kind = "curated_fact"
description = "Raw cargo-check stderr fragment shown alongside SubmitSolution.failed_* explanations."
example = "error[E0382]: borrow of moved value: `s`"
variants = ["literal"]

[[slots]]
name = "check_correct_value"
kind = "numeric"
description = "Expected numerical value for math-answer-check templates."
example = "12"
variants = ["literal"]

[[slots]]
name = "check_user_value"
kind = "numeric"
description = "User-supplied numerical value for math-answer-check templates."
example = "11"
variants = ["literal"]

[[slots]]
name = "check_unknown"
kind = "noun_term"
description = "Variable name being solved for in math-answer-check templates."
example = "x"
variants = ["literal"]
