[[slots]]
name = "system_birthdate"
kind = "system_self"
description = "Birthdate-aspect body for ask_about_system.birthdate."
example = "Алғашқы commit 2026-04-07-де..."
variants = ["literal"]

[[slots]]
name = "system_architecture"
kind = "system_self"
description = "Architecture-aspect body — describes ARK / FST / typed-fact-graph."
example = "ARK — Agglutinative Reasoning Kernel..."
variants = ["literal"]

[[slots]]
name = "system_capabilities"
kind = "system_self"
description = "Capabilities-aspect body."
example = "Істей алатыным: ..."
variants = ["literal"]

[[slots]]
name = "system_knowledge"
kind = "system_self"
description = "Knowledge-aspect body — what domains adam knows about."
example = "Қазіргі білімімнің ауқымы: ..."
variants = ["literal"]

[[slots]]
name = "system_limitations"
kind = "system_self"
description = "Limitations-aspect body."
example = "Істей алмайтыным: ..."
variants = ["literal"]

[[slots]]
name = "system_principles"
kind = "system_self"
description = "Principles-aspect body — what adam stands for."
example = "Менің ұстанатын принциптерім: ..."
variants = ["literal"]

[[slots]]
name = "system_self_comparison"
kind = "system_self"
description = "Self-comparison body — adam vs other models."
example = "Мен — детерминисттік тіл моделі..."
variants = ["literal"]

[[slots]]
name = "system_implementation"
kind = "system_self"
description = "Implementation-aspect body — programming language / stack."
example = "Менің кодым Rust тілінде жазылған..."
variants = ["literal"]

[[slots]]
name = "system_generic_capability"
kind = "system_self"
description = "Generic-capability body — for catch-all 'can you do X?' questions."
example = "Жоқ, ондай әрекетті өзім орындай алмаймын..."
