[workspace]
members = [
  "crates/adam-core",
  "crates/adam-tokenizer",
  "crates/adam-corpus",
  "crates/adam-eval",
  "crates/adam-train",
]
resolver = "2"

[workspace.package]
version = "0.0.41"
edition = "2024"
license = "MIT"

[workspace.dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"
